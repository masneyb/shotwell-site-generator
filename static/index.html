<!DOCTYPE html>
<html lang="en">

  -->

  <head>
    <meta name="viewport" content="width=device-width"/>
    <meta charset="UTF-8"/>
    <meta name="description" content="Photo gallery and search interface">
    <meta name="theme-color" content="#202124" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'; connect-src 'self'; manifest-src 'self'; frame-src 'self';">
    <title>Search</title>
    <link rel="icon" type="image/png" sizes="512x512" href="icons/app-icon-512x512-any.png"/>
    <link rel="icon" type="image/png" sizes="192x192" href="icons/app-icon-192x192-any.png"/>
    <link rel="manifest" href="manifest.json" crossorigin="use-credentials"/>
    <link rel="stylesheet" type="text/css" href="search.css"/>
    <script>
      window.onerror = function (message, source, lineno, colno, error) {
        alert(`JS error: ${message} at ${source}:${lineno}:${colno}`);
        return false;
      };
    </script>
  </head>

  <body>
    <header>
      <h1 id="title" class="page_title">Search</h1>
      <div class="summary_stats"></div>

      <nav class="main_views" aria-label="Main navigation">
        <span id="browse_button_group" class="view_button_group">
          <a href="#" id="browse_link" class="view_button">Media</a>
          <button type="button" id="browse_caret" class="view_button_caret hidden"
                  aria-label="Choose grouping" aria-haspopup="true"
                  aria-expanded="false">&#x25BE;</button>
          <div id="browse_menu" class="dropdown_menu hidden" role="menu">
            <a href="#" class="dropdown_item" data-group="none" role="menuitem">None</a>
            <a href="#" class="dropdown_item" data-group="day" role="menuitem">Day</a>
            <a href="#" class="dropdown_item" data-group="week" role="menuitem">Week</a>
            <a href="#" class="dropdown_item" data-group="month" role="menuitem">Month</a>
            <a href="#" class="dropdown_item" data-group="year" role="menuitem">Year</a>
            <a href="#" class="dropdown_item" data-group="camera" role="menuitem">Camera</a>
          </div>
        </span>
        <a href="#" id="map_link" class="view_button">Map</a>
        <a href="#" id="event_link" class="view_button">Events</a>
        <a href="#" id="year_link" class="view_button">Years</a>
        <a href="#" id="tag_link" class="view_button">Tags</a>
        <a href="#" id="stats_link" class="view_button">Stats</a>
        <span id="extra_header"></span>
        <a href="#" id="advanced_search_link" class="view_button">Filter</a>
      </nav>

      <div id="tag_parents" class="hidden"></div>
      <div id="event_comment" class="hidden"></div>
    </header>

    <dialog id="advanced_search_dialog" aria-label="Advanced search">
      <div class="dialog_header">
        <span class="dialog_title">Advanced Search</span>
        <a href="#" id="advanced_search_close" class="dialog_close" aria-label="Close">&#x2715;</a>
      </div>

      <div class="dialog_quick_links">
        <a class="header_link" href="#" id="today_link">Today</a>
        <a class="header_link" href="#" id="nearby_link">Nearby</a>
        <a class="header_link" href="#" id="animations_link"></a>
        <a class="header_link" href="#" id="csv_link">CSV</a>
      </div>

      <span id="search_criterias"></span>

      <div id="search_controls">
        <input type="button" id="add_search_row" value="+" aria-label="Add search row">
        <select id="match" aria-label="Match policy">
          <option value="any">Match Any</option>
          <option value="all">Match All</option>
          <option value="none">Match None</option>
        </select>
        <select id="group" aria-label="Group by">
          <option value="none">No grouping</option>
          <option value="day">Day</option>
          <option value="week">Week</option>
          <option value="month">Month</option>
          <option value="year">Year</option>
          <option value="camera">Camera</option>
        </select>
        <select id="sort" aria-label="Sort order">
          <option value="default">Default Sort</option>
          <option value="takenZA">Taken Z-A</option>
          <option value="takenAZ">Taken A-Z</option>
          <option value="createdZA">Added Z-A</option>
          <option value="createdAZ">Added A-Z</option>
          <option value="random">Random</option>
        </select>
        <div id="icon_size_controls">
          <label class="icon_size_check">
            <input type="checkbox" id="vary_by_rating"> Vary size by rating
          </label>
          <label class="icon_size_slider">
            <span class="icon_size_name">Size</span>
            <input type="range" id="icon_size" min="0" max="3" step="1" value="3" aria-label="Icon size">
            <span class="icon_size_value" id="icon_size_value"></span>
          </label>
          <label class="icon_size_slider" id="icon_meta_control">
            <span class="icon_size_name">Metadata</span>
            <input type="range" id="icon_meta" min="0" max="3" step="1" value="0" aria-label="Icon metadata level">
            <span class="icon_size_value" id="icon_meta_value"></span>
          </label>
        </div>
        <input class="button" type="button" id="clear_search_criteria" value="Clear">
        <input class="button" type="button" id="save_search_criteria" value="Done">
      </div>
    </dialog>

    <main id="all_media"><div class='status'>Loading</div></main>
    <iframe id="content_frame" class="hidden" title="Inline content"></iframe>
    <div id="search_results_calendar"></div>

    <div id="fullimage_background" class="hidden"></div>
    <div id="fullimage_container" class="hidden" role="dialog" aria-modal="true" aria-label="Full screen media viewer">
      <span id="slideshow_controls">
        <a href="#" id="metadata">
          <img id="metadata_icon" alt="Metadata" src="icons/list-web-icon.png"/>
        </a>
        <a href="#" id="play">
          <img id="play_pause_icon" alt="Play" src="icons/play-web-icon.png"/>
        </a>
        <a href="#" id="fullscreen">
          <img alt="Fullscreen" src="icons/fullscreen-web-icon.png"/>
        </a>
        <select id="slideshow_videos">
          <option value="480p">480p</option>
          <option value="720p">720p</option>
          <option value="1080p">1080p</option>
          <option value="full">Full</option>
        </select>
        <a href="#" id="close">
          <img alt="Close" src="icons/close-web-icon.png"/>
        </a>
      </span>
      <div id="fullmedia_container">
        <img id="fullimage">
        <video id="fullvideo" width="100%" height="100%" autoplay loop controls></video>
      </div>
      <div id="filmstrip"></div>
      <div id="description"></div>
      <div id="keyboard_shortcuts_overlay">
        <h3>Keyboard Shortcuts</h3>
        <table>
          <tr><td><kbd>← →</kbd></td><td>Previous / next photo</td></tr>
          <tr><td><kbd>Space</kbd> / <kbd>Enter</kbd></td><td>Toggle info panel</td></tr>
          <tr><td><kbd>f</kbd></td><td>Toggle browser fullscreen</td></tr>
          <tr><td><kbd>Home</kbd> / <kbd>End</kbd></td><td>First / last photo</td></tr>
          <tr><td><kbd>?</kbd></td><td>Show / hide this overlay</td></tr>
          <tr><td><kbd>Esc</kbd></td><td>Close viewer</td></tr>
        </table>
      </div>
    </div>

    <template id="search_criteria_row">
      <span class="search_criteria">
        <select class="search_field"></select>
        <select class="search_op"></select>
        <span class="search_values"></span>
        <input class="search_delete_row" type="button" value="X" aria-label="Delete search row">
      </span>
    </template>

    <script type="text/javascript" src="search.min.js"></script>
    <script type="text/javascript">doSearchInit();</script>
    <script type="text/javascript" src="media.js" defer="defer" onerror="updateOverallStatusMessage('Error loading media');"></script>
  </body>
</html>
